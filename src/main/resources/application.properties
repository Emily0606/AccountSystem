spring.application.name=accountsystem

# MySQL
# useSSL=false / allowPublicKeyRetrieval=true：本地開發不使用 SSL；MySQL 8+ 預設需要此旗標才能連線
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/account_system?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway
# Flyway 負責建立與版控 Schema；Hibernate 只做驗證，兩者分工
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA
# validate：Flyway 執行完 migration 後，Hibernate 驗證 Entity 與 Schema 是否一致
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# open-in-view=false：關閉「在 View 層延遲載入」反模式，強制所有 DB 操作在 Service 層的 Transaction 內完成
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# 正式環境必須透過環境變數 JWT_SECRET 注入，長度至少 32 字元
jwt.secret=${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars!}
# Access Token 有效期（毫秒），預設 15 分鐘
jwt.expiration-ms=900000
