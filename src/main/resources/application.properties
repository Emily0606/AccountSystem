spring.application.name=accountsystem

# MySQL
# useSSL=false / allowPublicKeyRetrieval=true：本地開發不使用 SSL；MySQL 8+ 預設需要此旗標才能連線
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/account_system?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# validate：啟動時比對 Entity 與資料庫 Schema 是否一致，不自動建表；需手動建立 Schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# open-in-view=false：關閉「在 View 層延遲載入」反模式，強制所有 DB 操作在 Service 層的 Transaction 內完成
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
