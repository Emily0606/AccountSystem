# H2 in-memory database for tests (Flyway disabled, Hibernate creates schema from entities)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

jwt.secret=test-secret-key-must-be-at-least-32-chars!
jwt.expiration-ms=900000
jwt.refresh-expiration-days=7

# 測試不需要掃描 API 文件，關閉以加快啟動速度
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
